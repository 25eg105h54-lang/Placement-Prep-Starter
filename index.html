<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
<title>Placement Prep Starter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


</head>

<body>

<!-- Auth Modal -->
<div class="modal" id="authModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div class="modal-content" style="background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px;">
        <h2 id="authTitle">Login</h2>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            <button onclick="handleLogin()" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0;">Login</button>
            <p style="text-align: center;">Don't have an account? <a href="#" onclick="toggleAuthForm(event)">Sign up</a></p>
        </div>
        <div id="signupForm" style="display: none;">
            <input type="text" id="signupName" placeholder="Full Name" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            <input type="email" id="signupEmail" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            <input type="password" id="signupPassword" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            <button onclick="handleSignup()" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0;">Sign Up</button>
            <p style="text-align: center;">Already have an account? <a href="#" onclick="toggleAuthForm(event)">Login</a></p>
        </div>
    </div>
</div>

<div class="sidebar">
    <h2>🚀 Roadmap</h2>
    <button class="week-btn" onclick="loadWeek(1,this)">Week 1</button>
    <button class="week-btn" onclick="loadWeek(2,this)">Week 2</button>
    <button class="week-btn" onclick="loadWeek(3,this)">Week 3</button>
    <button class="week-btn" onclick="loadWeek(4,this)">Week 4</button>
    <button class="week-btn" onclick="loadWeek(5,this)">Week 5</button>
    <button class="week-btn" onclick="loadWeek(6,this)">Week 6</button>
    <button class="week-btn" onclick="loadWeek(7,this)">Week 7</button>
    <button class="week-btn" onclick="loadWeek(8,this)">Week 8</button>
    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
    <button style="width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="handleLogout()">Logout</button>
</div>

<div class="main">
<div class="card">

<h1>Placement Prep Starter</h1>

<h3 id="welcomeMsg"></h3>

<div class="section-title">📌 Weekly Tasks</div>
<div id="tasks"></div>

<div class="section-title">➕ Add New Task</div>
<div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <input type="text" id="newTitle" placeholder="Task title" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
    <input type="number" id="newWeek" min="1" max="8" placeholder="Week" style="width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
    <button onclick="addTask()" style="padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Add Task</button>
</div>

<div class="section-title">📚 Resources</div>
<div id="resources"></div>

<div class="section-title">📊 Weekly Progress</div>
<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>
<div class="percentage" id="percentText">0% Completed</div>

<div class="section-title">🏆 Overall 8-Week Progress</div>
<div class="progress-container">
    <div class="progress-bar" id="overallBar"></div>
</div>
<div class="percentage" id="overallText">0% Completed</div>

</div>
</div>

<div class="modal" id="certificateModal">
<div class="modal-content">
    <h2>🎉 Congratulations!</h2>
    <p id="certificateText"></p>
    <button onclick="closeModal()">Close</button>
</div>
</div>


<script src="script.js"></script>

</body>
</html>
